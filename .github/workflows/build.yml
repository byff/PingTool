name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  release:
    types: [created]

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Get Go dependencies
        run: |
          go mod tidy
          go mod download

      - name: Get frontend dependencies
        working-directory: ./frontend
        run: npm install

      - name: Build Windows
        working-directory: .
        run: wails build --platform windows/amd64
        env:
          CGO_ENABLED: 1

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-amd64
          path: build/bin/*.exe

  build-linux-arm64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Get Go dependencies
        run: |
          go mod tidy
          go mod download

      - name: Get frontend dependencies
        working-directory: ./frontend
        run: npm install

      - name: Install gcc for arm64
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build Linux ARM64
        working-directory: .
        run: |
          CC=aarch64-linux-gnu-gcc wails build --platform linux/arm64
        env:
          CGO_ENABLED: 1

      - name: Upload Linux ARM64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-arm64
          path: build/bin/*

  build-linux-amd64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Get Go dependencies
        run: |
          go mod tidy
          go mod download

      - name: Get frontend dependencies
        working-directory: ./frontend
        run: npm install

      - name: Build Linux AMD64
        working-directory: .
        run: wails build --platform linux/amd64

      - name: Upload Linux AMD64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-amd64
          path: build/bin/*
